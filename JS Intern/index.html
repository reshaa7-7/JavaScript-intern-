<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Left Side -->
        <div class="left-container">

            <div class="logo">
                Facebook
            </div>

            <h1>
                Explore<br>
                the things<br>
                you love.
            </h1>

        </div>

        <!-- Right Side -->
        <div class="right-container">

            <div class="form-container">

                <h2>Log in to Facebook</h2>

                <!-- Email -->
                <div class="input-group">
                    <input
                        type="text"
                        id="email"
                        placeholder=" "
                        required
                    >
                    <label for="email">
                        Email address or mobile number
                    </label>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <input
                        type="password"
                        id="password"
                        placeholder=" "
                        required
                    >
                    <label for="password">
                        Password
                    </label>
                </div>

                <button class="login-btn">
                    Log in
                </button>

                <a href="#" class="forgot-password">
                    Forgotten password?
                </a>

                <button class="create-btn">
                    Create new account
                </button>

                <p class="meta">
                    Meta
                </p>

            </div>

        </div>

    </div>

</body>
</html>
